name = "navi-star"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./dist"

# KV 命名空间绑定
# 首次部署前，请先创建 KV 命名空间：
# wrangler kv:namespace create "NAVI_DATA"
# 然后将返回的 id 填入下方

[[kv_namespaces]]
binding = "NAVI_DATA"
id = "94ef08663abc4a8cb9f9bc77714ece05"

# 环境变量（敏感信息请使用 wrangler secret 设置）
# wrangler secret put JWT_SECRET
# wrangler secret put ADMIN_PASSWORD_HASH
[vars]
JWT_SECRET = "change-me-in-production"
